# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
app-template:
  controllers:
    nginx:
      containers:
        app: &nginx
          image:
            repository: nginx
            tag: 1.31.1-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
  service:
    app:
      controller: &app nginx
      ports:
        http:
          port: &port 80
  ingress:
    app-external:
      enabled: true
      className: "cloudflare-tunnel"
      hosts:
        - host: &host-ext www.songbird-fw.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
        - host: &host-ext songbird-fw.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
        - host: &host-ext www.songbird-fw.org
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
        - host: &host-ext songbird-fw.org
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
        - host: &host-ext www.songbird-fw.net
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
        - host: &host-ext songbird-fw.net
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
  configMaps:
    index:
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
      enabled: true
      data:
        index.html: |-
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Songbird — The GitOps Firewall</title>
            <meta name="description" content="Songbird is an open source GitOps firewall project focused on enterprise-grade power, speed, and simplicity for everyone.">
            <meta name="color-scheme" content="dark light">
            <meta property="og:title" content="Songbird — The GitOps Firewall">
            <meta property="og:description" content="An open source firewall project designed to bring enterprise-grade power and simple operations to everyone.">
            <meta property="og:type" content="website">
            <!-- Fonts -->
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
            <style>
              /* =============================================
                DESIGN TOKENS
              ============================================= */
              :root {
                --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
                --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
                --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
                --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
                --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
                --text-2xl:  clamp(2.2rem,   1.4rem  + 3vw,    4.8rem);

                --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
                --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
                --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
                --space-16: 4rem;   --space-20: 5rem;   --space-24: 6rem;

                --radius-sm: 0.375rem; --radius-md: 0.75rem;
                --radius-lg: 1.25rem;  --radius-xl: 1.6rem; --radius-full: 999px;

                --font-display: 'Space Grotesk', 'Segoe UI', ui-sans-serif, system-ui, sans-serif;
                --font-body:    'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
              }

              /* ── Dark Mode (default) ── */
              :root, [data-theme="dark"] {
                --color-bg:              #070b1a;
                --color-surface:         rgba(13,18,40,.88);
                --color-surface-2:       rgba(18,25,53,.92);
                --color-border:          rgba(98,123,201,.22);
                --color-divider:         rgba(120,141,214,.18);
                --color-text:            #f5f8ff;
                --color-text-muted:      #c1cae7;
                --color-text-faint:      #8f9ab8;
                --color-primary:         #22e5ff;
                --color-primary-hover:   #7cf0ff;
                --color-primary-strong:  #fe6f47;
                --color-primary-soft:    rgba(34,229,255,.14);
                --color-accent-soft:     rgba(254,111,71,.16);
                --shadow-sm: 0 10px 24px rgba(0,0,0,.18);
                --shadow-lg: 0 24px 80px rgba(0,0,0,.38);
              }

              /* ── Light Mode ── */
              [data-theme="light"] {
                --color-bg:              #f2f5ff;
                --color-surface:         rgba(255,255,255,.9);
                --color-surface-2:       rgba(245,248,255,.95);
                --color-border:          rgba(53,76,150,.16);
                --color-divider:         rgba(53,76,150,.12);
                --color-text:            #0c1330;
                --color-text-muted:      #40507f;
                --color-text-faint:      #6070a0;
                --color-primary:         #005d80;
                --color-primary-hover:   #0076a1;
                --color-primary-strong:  #d24e28;
                --color-primary-soft:    rgba(0,93,128,.10);
                --color-accent-soft:     rgba(210,78,40,.10);
                --shadow-sm: 0 12px 28px rgba(12,19,48,.10);
                --shadow-lg: 0 24px 80px rgba(12,19,48,.15);
              }
              @media (prefers-color-scheme: light) {
                :root:not([data-theme]) {
                  --color-bg:#f2f5ff; --color-surface:rgba(255,255,255,.9);
                  --color-surface-2:rgba(245,248,255,.95); --color-border:rgba(53,76,150,.16);
                  --color-divider:rgba(53,76,150,.12); --color-text:#0c1330;
                  --color-text-muted:#40507f; --color-text-faint:#6070a0;
                  --color-primary:#005d80; --color-primary-hover:#0076a1;
                  --color-primary-strong:#d24e28; --color-primary-soft:rgba(0,93,128,.10);
                  --color-accent-soft:rgba(210,78,40,.10);
                  --shadow-sm:0 12px 28px rgba(12,19,48,.10);
                  --shadow-lg:0 24px 80px rgba(12,19,48,.15);
                }
              }

              /* =============================================
                BASE
              ============================================= */
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              html { scroll-behavior: smooth; scroll-padding-top: 5rem; }
              body {
                min-height: 100dvh;
                font-family: var(--font-body); font-size: var(--text-base); line-height: 1.65;
                color: var(--color-text);
                background:
                  radial-gradient(circle at 10% 5%,  rgba(254,111,71,.18), transparent 26%),
                  radial-gradient(circle at 88% 8%,  rgba(34,229,255,.12), transparent 28%),
                  radial-gradient(circle at 50% 95%, rgba(34,229,255,.07), transparent 40%),
                  var(--color-bg);
              }
              img { display: block; max-width: 100%; height: auto; }
              p, li { text-wrap: pretty; max-width: 72ch; }
              h1,h2,h3,h4 { text-wrap: balance; line-height: 1.15; }
              a { color: inherit; transition: color 180ms ease; }
              button, a { transition: all 180ms ease; }

              .sr-only {
                position: absolute; width: 1px; height: 1px; padding: 0;
                margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
                white-space: nowrap; border: 0;
              }
              :focus-visible {
                outline: 3px solid var(--color-primary);
                outline-offset: 3px;
                border-radius: var(--radius-sm);
              }
              @media (prefers-reduced-motion: reduce) {
                html { scroll-behavior: auto; }
                *, *::before, *::after { animation: none !important; transition: none !important; }
              }

              /* =============================================
                LAYOUT
              ============================================= */
              .container { width: min(1120px, calc(100% - 2rem)); margin-inline: auto; }

              /* =============================================
                SKIP LINK
              ============================================= */
              .skip-link {
                position: absolute; left: 1rem; top: -5rem; z-index: 1000;
                background: var(--color-primary); color: #001e26; padding: .85rem 1.1rem;
                border-radius: var(--radius-full); text-decoration: none; font-weight: 700;
                font-size: var(--text-sm); transition: top 200ms ease;
              }
              .skip-link:focus { top: .8rem; }

              /* =============================================
                HEADER
              ============================================= */
              .site-header {
                position: sticky; top: 0; z-index: 100;
                backdrop-filter: blur(18px) saturate(160%);
                background: color-mix(in srgb, var(--color-bg) 82%, transparent);
                border-bottom: 1px solid var(--color-divider);
              }
              .header-inner {
                display: flex; align-items: center; justify-content: space-between;
                gap: var(--space-4); min-height: 4.5rem;
              }
              .brand {
                display: inline-flex; align-items: center; gap: .85rem;
                text-decoration: none; font-family: var(--font-display); font-weight: 700;
              }
              .brand-mark {
                width: 2.65rem; height: 2.65rem; border-radius: .8rem;
                box-shadow: var(--shadow-sm); flex-shrink: 0;
              }
              .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
              .brand-name { font-size: var(--text-base); }
              .brand-sub  { color: var(--color-text-muted); font-size: var(--text-xs); font-weight: 500; }
              .site-nav ul { list-style: none; display: flex; align-items: center; gap: .3rem; flex-wrap: wrap; }
              .site-nav a {
                display: inline-flex; align-items: center; min-height: 44px; padding: .5rem .9rem;
                border-radius: var(--radius-full); text-decoration: none; font-size: var(--text-sm);
                color: var(--color-text-muted); border: 1px solid transparent;
              }
              .site-nav a:hover, .site-nav a:focus-visible {
                color: var(--color-text); background: var(--color-primary-soft); border-color: var(--color-border);
              }
              .theme-toggle {
                display: inline-flex; align-items: center; justify-content: center;
                width: 44px; height: 44px; border-radius: var(--radius-full);
                border: 1px solid var(--color-border); background: transparent;
                cursor: pointer; color: var(--color-text-muted); font-size: 1.1rem;
              }
              .theme-toggle:hover { background: var(--color-primary-soft); color: var(--color-text); }

              /* =============================================
                SECTIONS
              ============================================= */
              section { padding: clamp(3.5rem, 6vw, 7rem) 0; }

              /* ─── Hero ─── */
              .hero { padding-top: clamp(3rem, 7vw, 7rem); }
              .hero-grid {
                display: grid; gap: var(--space-12); align-items: center;
                grid-template-columns: 1.1fr .9fr;
              }
              .eyebrow {
                display: inline-flex; align-items: center; gap: .55rem; padding: .45rem .9rem;
                border-radius: var(--radius-full); background: var(--color-primary-soft);
                border: 1px solid var(--color-border); color: var(--color-text-muted);
                font-size: var(--text-xs); font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
              }
              .hero h1 {
                font-family: var(--font-display); font-size: var(--text-2xl); line-height: 1;
                margin: 1rem 0 1.1rem; max-width: 12ch;
              }
              .hero-lead { max-width: 62ch; color: var(--color-text-muted); }
              .cta-row { display: flex; flex-wrap: wrap; gap: .9rem; margin-top: 1.7rem; }

              .button {
                display: inline-flex; align-items: center; justify-content: center; gap: .55rem;
                min-height: 48px; padding: .9rem 1.35rem; border-radius: var(--radius-full);
                text-decoration: none; font-weight: 700; font-size: var(--text-sm);
                border: 1px solid var(--color-border);
              }
              .button svg { flex-shrink: 0; }
              .button-primary {
                background: var(--color-primary); color: #03121a; border-color: transparent;
              }
              .button-primary:hover, .button-primary:focus-visible {
                background: var(--color-primary-hover); transform: translateY(-2px);
              }
              .button-secondary { background: var(--color-surface); color: var(--color-text); }
              .button-secondary:hover, .button-secondary:focus-visible {
                background: var(--color-surface-2); transform: translateY(-2px);
              }

              .hero-card {
                position: relative; isolation: isolate; padding: clamp(1.25rem,2vw,2rem);
                border-radius: var(--radius-xl); background: linear-gradient(160deg, var(--color-surface), var(--color-surface-2));
                border: 1px solid var(--color-border); box-shadow: var(--shadow-lg);
              }
              .hero-card::before {
                content:""; position:absolute; inset:-1px; border-radius:inherit; z-index:-1;
                background:linear-gradient(135deg, rgba(34,229,255,.25), rgba(254,111,71,.22), transparent 60%);
              }
              .hero-visual { display:grid; place-items:center; padding:clamp(.8rem,2vw,1.8rem); }
              .hero-visual img { width:min(100%,240px); border-radius:1.2rem; }
              .hero-stats { display:grid; grid-template-rows:repeat(3,1fr); gap:.75rem; margin-top:.9rem; }
              .stat {
                padding:.9rem; border-radius:1rem;
                background:rgba(255,255,255,.03); border:1px solid var(--color-border);
              }
              [data-theme="light"] .stat { background:rgba(0,0,0,.02); }
              .stat strong { display:block; font-family:var(--font-display); font-size:var(--text-lg); margin-bottom:.25rem; }
              .stat span { color:var(--color-text-muted); font-size:var(--text-xs); }

              /* ─── Shared section heading ─── */
              .section-head { margin-bottom:2rem; }
              .section-head h2 {
                font-family:var(--font-display); font-size:var(--text-xl);
                margin-bottom:.75rem;
              }
              .section-head p { color:var(--color-text-muted); }

              /* ─── Grids ─── */
              .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
              .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; }

              /* ─── Panels ─── */
              .panel {
                padding:1.4rem; border-radius:1.25rem; background:var(--color-surface);
                border:1px solid var(--color-border); box-shadow:var(--shadow-sm);
              }
              .panel h3 { font-family:var(--font-display); margin-bottom:.65rem; font-size:var(--text-lg); }
              .panel p  { color:var(--color-text-muted); }
              .panel ul { padding-left:1.1rem; margin:.7rem 0 0; }
              .panel li { color:var(--color-text-muted); }
              .panel li+li { margin-top:.5rem; }
              .accent-panel {
                background:linear-gradient(160deg, var(--color-primary-soft), transparent 130%), var(--color-surface);
              }
              blockquote.quote {
                border-left:3px solid var(--color-primary); padding-left:1.1rem;
                margin:1rem 0; color:var(--color-text-muted); font-style:italic;
              }

              /* ─── Principles split ─── */
              .principles { display:grid; grid-template-columns:.95fr 1.05fr; gap:1rem; }
              .check-list { list-style:none; padding:0; margin:.5rem 0 0; }
              .check-list li {
                position:relative; padding-left:1.8rem; margin-bottom:.9rem;
                color:var(--color-text-muted);
              }
              .check-list li::before {
                content:""; position:absolute; left:0; top:.45rem;
                width:.8rem; height:.8rem; border-radius:50%;
                background:linear-gradient(135deg, var(--color-primary), var(--color-primary-strong));
                box-shadow:0 0 0 .2rem var(--color-primary-soft);
              }

              /* ─── Callout / CTA ─── */
              .callout {
                padding:clamp(1.5rem,4vw,2.5rem); border-radius:1.5rem;
                background:
                  linear-gradient(135deg, var(--color-primary-soft), var(--color-accent-soft) 60%, transparent),
                  var(--color-surface);
                border:1px solid var(--color-border); box-shadow:var(--shadow-lg);
              }
              .callout h2 { font-family:var(--font-display); font-size:var(--text-xl); margin-bottom:.8rem; }
              .callout p  { color:var(--color-text-muted); margin-bottom:0; }

              /* =============================================
                FOOTER
              ============================================= */
              .site-footer {
                border-top: 1px solid var(--color-divider);
                padding: clamp(2.5rem, 5vw, 4rem) 0 clamp(1.5rem, 3vw, 2.5rem);
                background: color-mix(in srgb, var(--color-bg) 94%, black);
              }
              .footer-grid {
                display: grid; gap: var(--space-10);
                grid-template-columns: 1.5fr 1fr 1fr 1fr;
                margin-bottom: var(--space-10);
              }
              .footer-brand-col { display: flex; flex-direction: column; gap: var(--space-4); }
              .footer-brand {
                display: inline-flex; align-items: center; gap: .75rem;
                text-decoration: none; font-family: var(--font-display); font-weight: 700;
              }
              .footer-brand img { width: 2.2rem; height: 2.2rem; border-radius: .7rem; }
              .footer-tagline { color: var(--color-text-muted); font-size: var(--text-sm); max-width: 30ch; }

              .footer-col h4 {
                font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700;
                letter-spacing: .04em; text-transform: uppercase; color: var(--color-text-faint);
                margin-bottom: var(--space-4);
              }
              .footer-links { list-style: none; display: flex; flex-direction: column; gap: var(--space-3); }
              .footer-links a {
                text-decoration: none; color: var(--color-text-muted); font-size: var(--text-sm);
              }
              .footer-links a:hover, .footer-links a:focus-visible {
                color: var(--color-primary);
              }

              /* License badge */
              .license-badge {
                display: inline-flex; align-items: center; gap: .5rem; padding: .45rem .85rem;
                border-radius: var(--radius-full); border: 1px solid var(--color-border);
                background: var(--color-primary-soft); font-size: var(--text-xs); font-weight: 700;
                color: var(--color-text-muted); text-decoration: none; width: fit-content;
              }
              .license-badge:hover { color: var(--color-primary); }

              /* Footer bottom bar */
              .footer-bottom {
                display: flex; justify-content: space-between; align-items: center;
                flex-wrap: wrap; gap: var(--space-3);
                padding-top: var(--space-6); border-top: 1px solid var(--color-divider);
                font-size: var(--text-xs); color: var(--color-text-faint);
              }
              .footer-bottom a { color: var(--color-text-faint); text-decoration: none; }
              .footer-bottom a:hover { color: var(--color-primary); }

              /* =============================================
                RESPONSIVE
              ============================================= */
              @media (max-width: 1024px) {
                .footer-grid { grid-template-columns: 1fr 1fr; }
                .footer-brand-col { grid-column: 1 / -1; }
              }
              @media (max-width: 768px) {
                .hero-grid, .principles, .grid-3, .grid-2 { grid-template-columns: 1fr; }
                .hero-stats { grid-template-columns: 1fr; }
                .header-inner { flex-direction: column; align-items: flex-start; padding-block: .75rem; }
                .site-nav ul { width: 100%; }
                .footer-grid { grid-template-columns: 1fr 1fr; }
              }
              @media (max-width: 540px) {
                .container { width: min(100% - 1.5rem, 1120px); }
                .site-nav a { padding-inline: .65rem; }
                .button { width: 100%; }
                .footer-grid { grid-template-columns: 1fr; }
                .footer-bottom { flex-direction: column; align-items: flex-start; }
              }
            </style>
          </head>
          <body>
            <a class="skip-link" href="#content">Skip to main content</a>

            <!-- ═══════════════════════════════════ HEADER ══ -->
            <header class="site-header" role="banner">
              <div class="container header-inner">
                <a class="brand" href="#top" aria-label="Songbird — The GitOps Firewall — homepage">
                  <img class="brand-mark" src="data:image/jpeg;base64," alt="Songbird logo" width="96" height="96">
                  <span class="brand-text">
                    <span class="brand-name">Songbird</span>
                    <span class="brand-sub">The GitOps Firewall</span>
                  </span>
                </a>
                <nav class="site-nav" aria-label="Primary navigation">
                  <ul>
                    <li><a href="#why">Why</a></li>
                    <li><a href="#principles">Principles</a></li>
                    <li><a href="#approach">Approach</a></li>
                    <li><a href="#contribute">Contribute</a></li>
                    <li>
                      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme">
                        <span aria-hidden="true">◐</span>
                      </button>
                    </li>
                  </ul>
                </nav>
              </div>
            </header>

            <!-- ═══════════════════════════════════ MAIN ════ -->
            <main id="content">

              <!-- ─── Hero ─── -->
              <section class="hero" id="top" aria-labelledby="hero-heading">
                <div class="container hero-grid">
                  <div>
                    <span class="eyebrow" aria-label="Project status">Open source · Fast · GitOps-native</span>
                    <h1 id="hero-heading">Enterprise firewall power, built for everyone.</h1>
                    <p class="hero-lead">Songbird closes the gap between difficult community firewalls and expensive enterprise platforms — delivering strong capabilities, clean GitOps operations, and an interface that does not require specialist knowledge.</p>
                    <div class="cta-row">
                      <a class="button button-primary" href="https://github.com/songbird-fw" target="_blank" rel="noopener noreferrer">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.94 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4 11.5 11.5 0 0 1 3 .4c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.62-2.81 5.63-5.49 5.93.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12C24 5.37 18.63 0 12 0z"/></svg>
                        View on GitHub
                      </a>
                      <a class="button button-secondary" href="#contribute">Join the project</a>
                    </div>
                  </div>
                  <aside class="hero-card" aria-label="Songbird project highlights">
                    <div class="hero-visual">
                      <img src="data:image/jpeg;base64," alt="Neon hummingbird Songbird logo" width="720" height="720" loading="lazy">
                    </div>
                    <div class="hero-stats" aria-label="Core commitments">
                      <div class="stat"><strong>GitOps</strong><span>Config is versioned, reviewed, and repeatable.</span></div>
                      <div class="stat"><strong>Open</strong><span>Every contributor is welcome.</span></div>
                      <div class="stat"><strong>Disciplined</strong><span>Decisions drive implementation, not improvisation.</span></div>
                    </div>
                  </aside>
                </div>
              </section>

              <!-- ─── Why ─── -->
              <section id="why" aria-labelledby="why-heading">
                <div class="container">
                  <div class="section-head">
                    <h2 id="why-heading">Why Songbird exists</h2>
                    <p>A practical frustration: many open source firewalls are hard to operate, fragmented, or limited compared to enterprise products. Songbird was started to change that.</p>
                  </div>
                  <div class="grid-3">
                    <article class="panel accent-panel">
                      <h3>Simplicity without compromise</h3>
                      <p>Approachable workflows combined with the power normally expected from commercial firewall platforms. Good security tooling should not require unnecessary complexity to be effective.</p>
                    </article>
                    <article class="panel">
                      <h3>Free and open source</h3>
                      <p>Powerful firewall capabilities should remain available to everyone — not only to teams with enterprise budgets. The project is released as open source software for this reason.</p>
                    </article>
                    <article class="panel">
                      <h3>Fast by design</h3>
                      <p>Built on top of eBPF to get filtering speed even with commodity hardware.</p>
                    </article>
                  </div>
                </div>
              </section>

              <!-- ─── Principles ─── -->
              <section id="principles" aria-labelledby="principles-heading">
                <div class="container principles">
                  <article class="panel">
                    <div class="section-head">
                      <h2 id="principles-heading">Engineering discipline</h2>
                      <p>Songbird is grounded in software engineering principles instead of ad-hoc feature accumulation.</p>
                    </div>
                    <ul class="check-list" aria-label="Project principles">
                      <li>Design and specification precede implementation.</li>
                      <li>Software engineering methodology guided by SWEBOK.</li>
                      <li>Version control and peer review are core to the process, not just tooling choices.</li>
                      <li>Documentation and contribution clarity are as important as code quality.</li>
                    </ul>
                  </article>
                  <article class="panel">
                    <div class="section-head">
                      <h2>AI as an implementer</h2>
                      <p>The project uses AI in a deliberate and bounded role: as an accelerator for implementation, not as an autonomous product designer.</p>
                    </div>
                    <blockquote class="quote">
                      <p>AI tools act as "monkey programmers" — they implement what has already been designed, specified, and reviewed by the team, with no space for autonomous creative decisions.</p>
                    </blockquote>
                    <p style="color:var(--color-text-muted); margin-top:1rem;">This keeps the codebase coherent, reduces accidental complexity, and aligns contributors around explicit design intent.</p>
                  </article>
                </div>
              </section>

              <!-- ─── Approach ─── -->
              <section id="approach" aria-labelledby="approach-heading">
                <div class="container">
                  <div class="section-head">
                    <h2 id="approach-heading">What the project aims to deliver</h2>
                    <p>The focus is on product vision and coherent direction, leaving the implementation to evolve responsibly under engineering discipline.</p>
                  </div>
                  <div class="grid-2">
                    <article class="panel">
                      <h3>Operational clarity</h3>
                      <ul>
                        <li>Reviewable changes through Git-driven workflows.</li>
                        <li>Predictable deployments and safer collaboration.</li>
                        <li>Clear separation between design, implementation, and validation phases.</li>
                      </ul>
                    </article>
                    <article class="panel">
                      <h3>User-first security</h3>
                      <ul>
                        <li>Clean and fast UI.</li>
                        <li>Responsive layouts that work on phones, tablets, and desktops.</li>
                        <li>Simple to understand and to operate.</li>
                      </ul>
                    </article>
                  </div>
                </div>
              </section>

              <!-- ─── Contribute ─── -->
              <section id="contribute" aria-labelledby="contribute-heading">
                <div class="container">
                  <div class="callout">
                    <h2 id="contribute-heading">Contributors are welcome</h2>
                    <p>Songbird is built in the open. Whether your contribution is code, design review, documentation, testing, or product thinking, disciplined collaboration is at the heart of the project.</p>
                    <div class="cta-row">
                      <a class="button button-primary" href="https://github.com/songbird-fw" target="_blank" rel="noopener noreferrer">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.94 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4 11.5 11.5 0 0 1 3 .4c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.62-2.81 5.63-5.49 5.93.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12C24 5.37 18.63 0 12 0z"/></svg>
                        Explore the repository
                      </a>
                      <a class="button button-secondary" href="https://github.com/songbird-fw" target="_blank" rel="noopener noreferrer">Open GitHub organization</a>
                    </div>
                  </div>
                </div>
              </section>
            </main>

